# Conda environment for the genome-scale PFP adjustment pipeline.
#
# Reproducibility tiers:
#   1. This file pins every dependency to a major[.minor] version range, so a
#      fresh `conda env create -f environment.yml` resolves to a compatible,
#      stable stack (Python 3.10, PyTorch 2.x / CUDA 12.1, OR-Tools 9.x).
#   2. For a BIT-EXACT rebuild, generate a solved lockfile on the build host
#      (which has the CUDA stack) and commit it alongside this file:
#          conda activate pfp
#          conda env export --no-builds > environment.lock.yml   # exact versions
#          #   or, cross-platform:  conda-lock -f environment.yml -p linux-64
#   3. CPU-only smoke/golden tests (no GPU, no ML stack) run from
#      requirements-test.txt, which pins OR-Tools exactly; this is what CI uses.
name: pfp
channels:
  - conda-forge
  - pytorch
  - nvidia
  - bioconda
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24,<2.0
  - pandas>=2.0,<3.0
  - scipy>=1.10,<2.0
  - scikit-learn>=1.3,<2.0
  - networkx>=3.0,<4.0
  - tqdm>=4.65,<5.0
  - click>=8.1,<9.0
  - pyyaml>=6.0,<7.0
  - biopython>=1.81,<2.0
  - pytorch>=2.1,<3.0
  - pytorch-cuda=12.1
  - torchvision>=0.16,<1.0
  - torchaudio>=2.1,<3.0
  - diamond>=2.1,<3.0
  - mmseqs2>=15
  - pip:
      - ortools>=9.11,<10.0
      - fair-esm>=2.0,<3.0
      - transformers>=4.30,<5.0
      - dgl>=1.1
