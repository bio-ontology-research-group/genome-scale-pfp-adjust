name: CI

on:
  push:
  pull_request:

jobs:
  smoke-tests:
    name: CPU smoke + golden tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Verify constraint-file checksums
        run: python data/constraints/verify_checksums.py

      - name: Data-loader smoke test
        run: python tests/test_data_loaders.py

      - name: Solver smoke test (Stage 1 + Stage 2)
        run: python tests/test_solver_smoke.py

      - name: Golden end-to-end test
        run: python tests/test_golden_e2e.py
